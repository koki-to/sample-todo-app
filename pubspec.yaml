name: sample_todo_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  # 状態管理（Riverpod 3.x）
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # イミュータブルなデータモデル（Freezed 3.x）
  freezed_annotation: ^3.1.0

  # ローカルDB（現場で最もよく使われる SQLite ORM）
  drift: ^2.31.0
  path_provider: ^2.1.5
  drift_flutter: ^0.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # コード生成（dev のみ）
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  drift_dev: ^2.31.0

flutter:
  uses-material-design: true
